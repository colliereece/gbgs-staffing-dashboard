<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBGS · Staffing Levels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #021D41;
      --bg-elevated: #0a2e5e;
      --bg-row: #ffffff;
      --bg-row-alt: #f8f9ff;
      --ink: #021D41;
      --ink-muted: #6b7a90;
      --line: #e2e6f0;
      --critical-bg: #ffe8ec;
      --critical-fg: #d12a45;
      --understaffed-bg: #fef6e0;
      --understaffed-fg: #b8651b;
      --sweet-bg: #e8fbf0;
      --sweet-fg: #1f9858;
      --over-bg: #ebf1ff;
      --over-fg: #3461d6;
      --good-bg: #eaf6ee;
      --good-fg: #2c7a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f0f2f6;
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--bg);
      color: white;
      padding: 28px 40px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .header h1 .sep { color: #6388b8; margin: 0 10px; font-weight: 500; }
    .header h1 .live {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #75e099;
      letter-spacing: 0.1em;
      vertical-align: middle;
      margin-left: 12px;
      padding: 3px 8px;
      background: rgba(117, 224, 153, 0.12);
      border: 1px solid rgba(117, 224, 153, 0.3);
      border-radius: 3px;
    }

    .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #8ea2c0;
      text-align: right;
    }
    .meta .stamp { color: #c4d2e5; }

    .month-bar {
      padding: 20px 40px;
      background: var(--bg-elevated);
      color: white;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #1d3157;
    }

    .month-picker {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .month-picker label {
      font-size: 13px;
      font-weight: 500;
      color: #c4d2e5;
      letter-spacing: 0.02em;
    }
    .month-picker select {
      background: white;
      color: var(--bg);
      border: none;
      padding: 9px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-width: 140px;
    }
    .month-picker select:focus { outline: 2px solid #75e099; outline-offset: 2px; }

    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .pill {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .pill .count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
    }
    .pill.critical { background: rgba(255, 59, 91, 0.18); color: #ff95a4; }
    .pill.under { background: rgba(251, 175, 45, 0.2); color: #ffc680; }
    .pill.sweet { background: rgba(117, 224, 153, 0.2); color: #8de8ad; }
    .pill.over { background: rgba(74, 130, 255, 0.25); color: #93b0ff; }
    .pill.hires {
      background: rgba(158, 40, 181, 0.22);
      color: #d59ce4;
      margin-left: 8px;
      position: relative;
    }
    .pill.hires::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 20%;
      bottom: 20%;
      width: 1px;
      background: rgba(255, 255, 255, 0.15);
    }

    main { padding: 28px 40px 60px; }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      background: white;
    }
    .search:focus { outline: 2px solid var(--bg); outline-offset: -1px; }

    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink-muted);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--bg); color: var(--ink); }
    .filter-btn.active {
      background: var(--bg);
      color: white;
      border-color: var(--bg);
    }

    .table-wrap {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 1px 2px rgba(10, 22, 40, 0.04);
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: #f7f9fc;
      text-align: left;
      padding: 13px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }

    tbody tr {
      border-bottom: 1px solid var(--line);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-row-alt); }

    td { padding: 14px 16px; font-size: 14px; }

    .zone {
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      background: #eef2f8;
      color: var(--ink);
    }
    .zone.a { background: #ebf1ff; color: var(--over-fg); }
    .zone.b { background: #ffe8ec; color: var(--critical-fg); }
    .zone.c { background: #e8fbf0; color: var(--sweet-fg); }

    .location { font-weight: 600; }
    .gm { color: var(--ink-muted); font-size: 13px; }

    .health {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .health.critical { background: var(--critical-bg); color: var(--critical-fg); }
    .health.understaffed { background: var(--understaffed-bg); color: var(--understaffed-fg); }
    .health.sweet { background: var(--sweet-bg); color: var(--sweet-fg); }
    .health.over { background: var(--over-bg); color: var(--over-fg); }

    .coverage { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    .shifts-need {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--critical-fg);
      font-weight: 600;
    }
    .shifts-need.empty { color: var(--ink-muted); font-weight: 400; }

    .ratio {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }
    .ratio-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-muted);
    }
    .ratio-bar {
      display: flex;
      width: 60px;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--line);
    }
    .ratio-bar .ft { background: var(--bg); }
    .ratio-bar .pt { background: #b8c6dd; }

    .thin {
      font-size: 12px;
      max-width: 360px;
      line-height: 1.5;
    }
    .thin.good { color: var(--good-fg); font-weight: 500; }
    .thin.warn { color: var(--understaffed-fg); }
    .thin.muted { color: var(--ink-muted); font-style: italic; }

    .footer-row {
      background: var(--bg);
      color: white;
      font-weight: 600;
    }
    .footer-row td {
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      color: white;
    }

    .status {
      padding: 60px 40px;
      text-align: center;
      color: var(--ink-muted);
    }
    .status.error { color: var(--critical-fg); }

    .footer-note {
      margin-top: 16px;
      font-size: 12px;
      color: var(--ink-muted);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }
    .footer-note .now-tag {
      color: var(--understaffed-fg);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .header, .month-bar, main { padding-left: 20px; padding-right: 20px; }
      .header h1 { font-size: 22px; }
      .pills { margin-left: 0; }
      th, td { padding: 10px 12px; font-size: 13px; }
      .thin { max-width: 200px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>
      Great Big Game Show
      <span class="sep">·</span>
      Staffing Levels
      <span class="live">● LIVE</span>
    </h1>
    <div class="meta">
      <div>Auto-syncs from Gold Mine</div>
      <div class="stamp" id="updated">Loading…</div>
    </div>
  </header>

  <section class="month-bar">
    <div class="month-picker">
      <label for="month">📅 Viewing month:</label>
      <select id="month"></select>
    </div>
    <div class="pills" id="pills"></div>
  </section>

  <main>
    <div class="controls">
      <input class="search" id="search" placeholder="Search location or GM…">
      <div class="filter-group" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="thin">Needs attention</button>
        <button class="filter-btn" data-filter="A">Zone A</button>
        <button class="filter-btn" data-filter="B">Zone B</button>
        <button class="filter-btn" data-filter="C">Zone C</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Location</th>
            <th>Zone</th>
            <th>Health</th>
            <th class="num">Coverage</th>
            <th class="num">Shifts/wk to 120%</th>
            <th>Hires Needed</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6" class="status" id="status">Loading staffing data…</td></tr>
        </tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>

    <div class="footer-note" id="footer-note">
      Source: Hiring Dashboard · Zone A/B/C Data · Published CSVs
    </div>
  </main>

  <script>
    const ZONE_URLS = {
      A: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlb5ubrEZwKLxIwVXZgeXNaRSOMJAGIYtYe4kYD5lC-HFDZQM0-UhWJVr70AmqwBYZ2qyBAqJZ5xYz/pub?gid=957066611&single=true&output=csv',
      B: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlb5ubrEZwKLxIwVXZgeXNaRSOMJAGIYtYe4kYD5lC-HFDZQM0-UhWJVr70AmqwBYZ2qyBAqJZ5xYz/pub?gid=173853367&single=true&output=csv',
      C: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlb5ubrEZwKLxIwVXZgeXNaRSOMJAGIYtYe4kYD5lC-HFDZQM0-UhWJVr70AmqwBYZ2qyBAqJZ5xYz/pub?gid=967304798&single=true&output=csv'
    };

    const HIRES_NEEDED_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlb5ubrEZwKLxIwVXZgeXNaRSOMJAGIYtYe4kYD5lC-HFDZQM0-UhWJVr70AmqwBYZ2qyBAqJZ5xYz/pub?gid=1821441189&single=true&output=csv';
    const STORE_NAMES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlb5ubrEZwKLxIwVXZgeXNaRSOMJAGIYtYe4kYD5lC-HFDZQM0-UhWJVr70AmqwBYZ2qyBAqJZ5xYz/pub?gid=837090199&single=true&output=csv';

    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // Fallback map — only used if the Store Names tab fails to load.
    // The live map (built from the "Store Names" tab) takes priority.
    const FALLBACK_NAME_MAP = {
      'GBGS Opry': 'Nashville', 'Opry Mills Mall': 'Nashville', 'Opry': 'Nashville',
      'St Louis': 'St. Louis',
      'GBGS Wharf (2)': 'San Francisco', 'San Francisco Wharf': 'San Francisco', 'Wharf*': 'San Francisco',
      'GBGS Las Vegas Forum': 'Las Vegas (Forum Shops)', 'LV Forum*': 'Las Vegas (Forum Shops)',
      'GBGS New Jersey': 'New Jersey (American Dream)', 'New Jersey': 'New Jersey (American Dream)',
      'GBGS Honolulu': 'Honolulu', 'Honolulu*': 'Honolulu',
      'GBGS San Jose': 'San Jose', 'San Jose*': 'San Jose',
      'GBGS Seattle Southcenter': 'Seattle (Tukwila)', 'Seattle SC*': 'Seattle (Tukwila)',
      'GBGS Seattle Downtown': 'Seattle (Downtown)', 'Seattle DTN*': 'Seattle (Downtown)',
      'GBGS Area 15': 'Las Vegas (Area 15)', 'A15*': 'Las Vegas (Area 15)',
      'GBGS Murray': 'Murray', 'Murray*': 'Murray',
      'BIRMINGHAM': 'Birmingham',
      'ORLANDO': 'Orlando',
      'Schaumburg*': 'Schaumburg',
      'Minneapolis*': 'Minneapolis',
      'Atlanta': 'Atlanta: Battery'
    };

    // Live name map, populated from the Store Names tab at load. Starts as the fallback.
    let nameMap = { ...FALLBACK_NAME_MAP };

    function normalizeName(raw) {
      const trimmed = (raw || '').trim();
      return nameMap[trimmed] || trimmed;
    }

    // Fetch the Store Names tab and rebuild nameMap from it.
    // Columns: Raw Name (A), Display Name (B), Zone (C)
    async function fetchStoreNames() {
      try {
        const res = await fetch(STORE_NAMES_URL + '&t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        if (rows.length < 2) throw new Error('No rows');

        const headers = rows[0].map(h => h.trim());
        const rawCol = findCol(headers, 'Raw Name', 'Raw');
        const displayCol = findCol(headers, 'Display Name', 'Display', 'Normalized');
        const rIdx = rawCol >= 0 ? rawCol : 0;
        const dIdx = displayCol >= 0 ? displayCol : 1;

        const map = {};
        for (let i = 1; i < rows.length; i++) {
          const raw = (rows[i][rIdx] || '').trim();
          const display = (rows[i][dIdx] || '').trim();
          if (!raw || !display) continue;
          map[raw] = display;
        }
        if (Object.keys(map).length > 0) {
          nameMap = map; // replace fallback with the live map
          console.log('Store Names map loaded:', Object.keys(map).length, 'entries');
        }
      } catch (err) {
        console.warn('Could not load Store Names tab, using fallback map:', err);
        // nameMap already holds the fallback, so nothing to do
      }
    }

    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
          else if (c === '"') { inQuotes = false; }
          else { field += c; }
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (c === '\r') { /* skip */ }
          else { field += c; }
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function num(v) {
      if (v === null || v === undefined || v === '') return 0;
      const s = String(v).trim();
      const hadPercent = s.endsWith('%');
      const n = parseFloat(s.replace(/[,$%]/g, ''));
      if (isNaN(n)) return 0;
      // If the original string ended in %, it's a formatted percentage (e.g., "500%" means 5.00, "116%" means 1.16)
      return hadPercent ? n / 100 : n;
    }

    // Coverage = Cap / Fill (per Apps Script)
    //   >=131%  Overstaffed
    //   >=120%  Sweet Spot
    //   >=111%  Understaffed
    //   else    Critical
    function classifyHealth(coveragePct) {
      if (coveragePct >= 131) return { key: 'over', label: '↑ Overstaffed' };
      if (coveragePct >= 120) return { key: 'sweet', label: '✓ Sweet Spot' };
      if (coveragePct >= 111) return { key: 'understaffed', label: '⚠ Understaffed' };
      return { key: 'critical', label: '✗ Critical' };
    }

    let allStores = [];
    let hiresMap = {}; // location name -> { needFT, needPT, total, by, notes }
    let selectedMonth = MONTHS[new Date().getMonth()];
    let activeFilter = 'all';
    let searchTerm = '';

    async function fetchHiresNeeded() {
      try {
        const res = await fetch(HIRES_NEEDED_URL + '&t=' + Date.now());
        if (!res.ok) return {};
        const text = await res.text();
        const rows = parseCSV(text);
        if (rows.length < 2) return {};

        const headers = rows[0].map(h => h.trim());
        const COL = {
          location: findCol(headers, 'Location', 'Store', 'Store Name', ''),  // first col may be blank
          needFT: findCol(headers, 'Need FT', 'FT', 'Need Full Time'),
          needPT: findCol(headers, 'Need PT', 'PT', 'Need Part Time'),
          total: findCol(headers, 'Total'),
          by: findCol(headers, 'By', 'By Date', 'Deadline'),
          notes: findCol(headers, 'Notes', 'Note'),
        };

        // The location column may be unlabeled — try position 0 if not found
        const locCol = COL.location >= 0 ? COL.location : 0;

        const map = {};
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const locRaw = (r[locCol] || '').trim();
          if (!locRaw || locRaw.toLowerCase() === 'location') continue;
          // Skip the grand-total summary row at the bottom of the sheet
          if (locRaw.toLowerCase() === 'total' || locRaw.toLowerCase() === 'totals') continue;
          const loc = normalizeName(locRaw);
          const totalRaw = (r[COL.total] || '').trim();
          const total = totalRaw === '-' || totalRaw === '' ? 0 : num(totalRaw);
          map[loc] = {
            needFT: (r[COL.needFT] || '').trim(),
            needPT: (r[COL.needPT] || '').trim(),
            total: total,
            by: (r[COL.by] || '').trim(),
            notes: (r[COL.notes] || '').trim(),
          };
        }
        console.log('Hires Needed loaded:', Object.keys(map).length, 'stores');
        return map;
      } catch (err) {
        console.warn('Could not load Hires Needed:', err);
        return {};
      }
    }

    // Try multiple name variations to find a column index
    function findCol(headers, ...candidates) {
      for (const cand of candidates) {
        const target = cand.toLowerCase().replace(/\s+/g, ' ').trim();
        for (let i = 0; i < headers.length; i++) {
          const h = (headers[i] || '').toLowerCase().replace(/\s+/g, ' ').trim();
          if (h === target) return i;
        }
      }
      // Loose contains fallback
      for (const cand of candidates) {
        const target = cand.toLowerCase().trim();
        for (let i = 0; i < headers.length; i++) {
          const h = (headers[i] || '').toLowerCase().trim();
          if (h.includes(target)) return i;
        }
      }
      return -1;
    }

    async function fetchZone(zone) {
      const res = await fetch(ZONE_URLS[zone] + '&t=' + Date.now());
      if (!res.ok) throw new Error(`Zone ${zone}: HTTP ${res.status}`);
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 2) return [];

      const headers = rows[0].map(h => h.trim());

      // Try to find columns by header name first
      let storeCol = findCol(headers, 'Store Name', 'Store');
      let fillCols = MONTH_SHORT.map((s, i) => findCol(headers, `${s} Fill`, `${MONTHS[i]} Fill`));
      let capCols = MONTH_SHORT.map((s, i) => findCol(headers, `${s} Cap`, `${MONTHS[i]} Cap`));
      let wksCols = MONTH_SHORT.map((s, i) => findCol(headers, `${s} Wks`, `${MONTHS[i]} Wks`, `${s} Weeks`));

      // FALLBACK: If header lookup failed for the month columns, use the Apps Script's
      // hardcoded indices. The COMPILED DATA tab from the Gold Mine has a known layout:
      //   col 1  = Store Name
      //   cols 16-27 = Jan Fill through Dec Fill
      //   cols 36-47 = Jan Cap through Dec Cap
      //   cols 48-59 = Jan Wks through Dec Wks
      const fillBroken = fillCols.some(c => c < 0);
      const capBroken = capCols.some(c => c < 0);
      const wksBroken = wksCols.some(c => c < 0);

      if (storeCol < 0) storeCol = 1;
      if (fillBroken) fillCols = MONTH_SHORT.map((_, i) => 16 + i);
      if (capBroken) capCols = MONTH_SHORT.map((_, i) => 36 + i);
      if (wksBroken) wksCols = MONTH_SHORT.map((_, i) => 48 + i);

      const COL = { store: storeCol };

      // Brief debug info — useful if columns shift again in the future
      if (zone === 'A') {
        const fallback = fillBroken || capBroken || wksBroken;
        console.log(`Zone A loaded · ${headers.length} cols · fallback: ${fallback}`);
      }

      const out = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const storeName = (r[COL.store] || '').trim();
        if (!storeName || storeName === 'Store Name') continue;

        const monthly = {}, monthlyCap = {}, monthlyWeeks = {};
        MONTHS.forEach((m, mi) => {
          monthly[m] = num(r[fillCols[mi]]);
          monthlyCap[m] = num(r[capCols[mi]]);
          monthlyWeeks[m] = num(r[wksCols[mi]]) || 4;
        });

        out.push({
          zone: `Zone ${zone}`,
          zoneLetter: zone,
          name: normalizeName(storeName),
          monthly, monthlyCap, monthlyWeeks,
        });
      }
      return out;
    }

    async function loadAll() {
      try {
        // Load the name map FIRST so all subsequent normalization uses the live map
        await fetchStoreNames();

        const [a, b, c, hires] = await Promise.all([
          fetchZone('A'), fetchZone('B'), fetchZone('C'), fetchHiresNeeded()
        ]);
        allStores = [...a, ...b, ...c];
        hiresMap = hires;
        if (allStores.length === 0) throw new Error('No data found in any zone');
        document.getElementById('updated').textContent = 'Loaded ' + new Date().toLocaleString();
        renderAll();
      } catch (err) {
        document.getElementById('status').textContent = 'Failed to load: ' + err.message;
        document.getElementById('status').classList.add('error');
        console.error(err);
      }
    }

    function computeRow(s, month) {
      const fill = s.monthly[month] || 0;
      const cap = s.monthlyCap[month] || 0;
      const wks = s.monthlyWeeks[month] || 4;
      const coverage = (fill > 0) ? (cap / fill) * 100 : 0;
      const health = classifyHealth(coverage);
      const needed = (fill * 1.2) - cap;
      const shiftsPerWk = (needed > 0 && wks > 0) ? (needed / wks) : 0;
      return { fill, cap, wks, coverage, health, shiftsPerWk };
    }

    function renderPills() {
      const counts = { critical: 0, understaffed: 0, sweet: 0, over: 0 };
      allStores.forEach(s => {
        const c = computeRow(s, selectedMonth);
        if (c.fill === 0) return;
        counts[c.health.key]++;
      });
      const totalHires = Object.values(hiresMap).reduce((sum, h) => sum + (h.total || 0), 0);
      document.getElementById('pills').innerHTML = `
        <div class="pill critical"><span class="count">${counts.critical}</span> Critical</div>
        <div class="pill under"><span class="count">${counts.understaffed}</span> Understaffed</div>
        <div class="pill sweet"><span class="count">${counts.sweet}</span> Sweet Spot</div>
        <div class="pill over"><span class="count">${counts.over}</span> Overstaffed</div>
        <div class="pill hires"><span class="count">${totalHires}</span> Need to hire</div>
      `;
    }

    function renderTable() {
      const tbody = document.getElementById('rows');
      const tfoot = document.getElementById('tfoot');
      const term = searchTerm.toLowerCase();

      let rows = allStores.map(s => ({ s, c: computeRow(s, selectedMonth) }))
                          .filter(r => r.c.fill > 0);

      if (activeFilter === 'thin') {
        rows = rows.filter(r => {
          const needsStaffing = r.c.health.key === 'critical' || r.c.health.key === 'understaffed';
          const h = hiresMap[r.s.name];
          const isHiring = h && h.total > 0;
          return needsStaffing || isHiring;
        });
      } else if (['A','B','C'].includes(activeFilter)) {
        rows = rows.filter(r => r.s.zoneLetter === activeFilter);
      }

      if (term) {
        rows = rows.filter(r =>
          r.s.name.toLowerCase().includes(term) ||
          r.s.gm.toLowerCase().includes(term)
        );
      }

      rows.sort((a, b) => {
        if (a.s.zoneLetter !== b.s.zoneLetter) return a.s.zoneLetter.localeCompare(b.s.zoneLetter);
        return a.c.coverage - b.c.coverage;
      });

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="status">No locations match.</td></tr>`;
        tfoot.innerHTML = '';
        return;
      }

      tbody.innerHTML = rows.map(({ s, c }) => {
        const covDisplay = Math.round(c.coverage) + '%';
        const shiftsCell = c.shiftsPerWk > 0
          ? `<span class="shifts-need">+${(Math.round(c.shiftsPerWk * 10) / 10).toFixed(1)}/wk</span>`
          : `<span class="shifts-need empty">—</span>`;

        // Hires Needed — current snapshot of what's open, independent of which month is being viewed
        let hiresCell;
        const h = hiresMap[s.name];
        if (!h || h.total === 0) {
          hiresCell = `<span class="thin good">✓ Fully staffed</span>`;
        } else {
          const ft = h.needFT && h.needFT !== '-' ? `${h.needFT} FT` : '';
          const pt = h.needPT && h.needPT !== '-' ? `${h.needPT} PT` : '';
          const parts = [ft, pt].filter(Boolean).join(' + ');
          const byText = h.by ? ` by ${formatDate(h.by)}` : '';
          hiresCell = `<span class="thin warn"><strong>${h.total}</strong> needed${parts ? ` (${parts})` : ''}${byText}</span>`;
        }

        return `
          <tr>
            <td class="location">${s.name}</td>
            <td><span class="zone ${s.zoneLetter.toLowerCase()}">${s.zoneLetter}</span></td>
            <td><span class="health ${c.health.key}">${c.health.label}</span></td>
            <td class="num coverage">${covDisplay}</td>
            <td class="num">${shiftsCell}</td>
            <td>${hiresCell}</td>
          </tr>
        `;
      }).join('');

      const totalShifts = rows.reduce((sum, r) => sum + r.c.shiftsPerWk, 0);
      const totalLabel = totalShifts > 0
        ? `+${(Math.round(totalShifts * 100) / 100).toFixed(2)}/wk needed`
        : '✓ On track network-wide';
      tfoot.innerHTML = `
        <tr class="footer-row">
          <td colspan="4">TOTALS · ${rows.length} stores shown</td>
          <td class="num">${totalLabel}</td>
          <td></td>
        </tr>
      `;
    }

    // Format various date inputs (ISO, locale strings, etc.) into "MMM D"
    function formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d.getTime())) return s; // fallback to original if unparseable
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderAll() {
      renderPills();
      renderTable();
      document.getElementById('footer-note').innerHTML = `Source: Hiring Dashboard · Zone A/B/C Data + Hires Needed · Published CSVs`;
    }

    const monthSelect = document.getElementById('month');
    MONTHS.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      if (m === selectedMonth) opt.selected = true;
      monthSelect.appendChild(opt);
    });
    monthSelect.addEventListener('change', (e) => {
      selectedMonth = e.target.value;
      renderAll();
    });

    document.getElementById('search').addEventListener('input', (e) => {
      searchTerm = e.target.value;
      renderTable();
    });

    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.filter;
      renderTable();
    });

    loadAll();
    setInterval(loadAll, 5 * 60 * 1000);
  </script>
</body>
</html>
