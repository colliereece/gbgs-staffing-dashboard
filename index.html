<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBGS · Staffing Levels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a1628;
      --bg-elevated: #122340;
      --bg-row: #ffffff;
      --bg-row-alt: #f7f9fc;
      --ink: #0a1628;
      --ink-muted: #6b7a90;
      --line: #e4e9f0;
      --critical-bg: #fde7e7;
      --critical-fg: #c62828;
      --understaffed-bg: #fff3d6;
      --understaffed-fg: #b8651b;
      --sweet-bg: #d9f5e3;
      --sweet-fg: #1b7a3e;
      --over-bg: #e0eaff;
      --over-fg: #2d4eaa;
      --good-bg: #eaf6ee;
      --good-fg: #2c7a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f0f2f6;
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--bg);
      color: white;
      padding: 28px 40px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .header h1 .sep { color: #4a6388; margin: 0 10px; font-weight: 500; }
    .header h1 .live {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #5cdb95;
      letter-spacing: 0.1em;
      vertical-align: middle;
      margin-left: 12px;
      padding: 3px 8px;
      background: rgba(92, 219, 149, 0.12);
      border: 1px solid rgba(92, 219, 149, 0.3);
      border-radius: 3px;
    }

    .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #8ea2c0;
      text-align: right;
    }

    .meta .stamp { color: #c4d2e5; }

    .summary {
      padding: 20px 40px;
      background: var(--bg-elevated);
      color: white;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid #1d3157;
    }

    .pill {
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pill .count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
    }
    .pill.critical { background: rgba(198, 40, 40, 0.18); color: #ff8a8a; }
    .pill.under { background: rgba(184, 101, 27, 0.2); color: #ffc680; }
    .pill.sweet { background: rgba(27, 122, 62, 0.2); color: #7ee5a3; }
    .pill.over { background: rgba(45, 78, 170, 0.25); color: #93b0ff; }

    main {
      padding: 28px 40px 60px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      background: white;
    }
    .search:focus { outline: 2px solid var(--bg); outline-offset: -1px; }

    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink-muted);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--bg); color: var(--ink); }
    .filter-btn.active {
      background: var(--bg);
      color: white;
      border-color: var(--bg);
    }

    .table-wrap {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 1px 2px rgba(10, 22, 40, 0.04);
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: #f7f9fc;
      text-align: left;
      padding: 13px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }

    tbody tr {
      border-bottom: 1px solid var(--line);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-row-alt); }

    td {
      padding: 14px 16px;
      font-size: 14px;
    }

    .zone {
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      background: #eef2f8;
      color: var(--ink);
    }

    .location { font-weight: 600; }
    .gm { color: var(--ink-muted); font-size: 13px; }

    .health {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .health.critical { background: var(--critical-bg); color: var(--critical-fg); }
    .health.understaffed { background: var(--understaffed-bg); color: var(--understaffed-fg); }
    .health.sweet { background: var(--sweet-bg); color: var(--sweet-fg); }
    .health.over { background: var(--over-bg); color: var(--over-fg); }

    .coverage { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    .shifts-need {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--critical-fg);
      font-weight: 600;
    }
    .shifts-need.empty { color: var(--ink-muted); font-weight: 400; }

    .ratio-bar {
      display: flex;
      width: 60px;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--line);
      margin-left: auto;
    }
    .ratio-bar .ft { background: var(--bg); }
    .ratio-bar .pt { background: #b8c6dd; }

    .thin {
      font-size: 12px;
      max-width: 360px;
      line-height: 1.5;
    }
    .thin.good { color: var(--good-fg); font-weight: 500; }
    .thin.warn { color: var(--understaffed-fg); }

    .footer-row {
      background: var(--bg);
      color: white;
      font-weight: 600;
    }
    .footer-row td {
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .status {
      padding: 60px 40px;
      text-align: center;
      color: var(--ink-muted);
    }
    .status.error { color: var(--critical-fg); }

    .footer-note {
      margin-top: 16px;
      font-size: 12px;
      color: var(--ink-muted);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 900px) {
      .header, .summary, main { padding-left: 20px; padding-right: 20px; }
      .header h1 { font-size: 22px; }
      th, td { padding: 10px 12px; font-size: 13px; }
      .thin { max-width: 200px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>
      Great Big Game Show
      <span class="sep">·</span>
      Staffing Levels
      <span class="live">● LIVE</span>
    </h1>
    <div class="meta">
      <div>Auto-syncs from Gold Mine</div>
      <div class="stamp" id="updated">Loading…</div>
    </div>
  </header>

  <section class="summary" id="summary"></section>

  <main>
    <div class="controls">
      <input class="search" id="search" placeholder="Search location or GM…">
      <div class="filter-group" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="thin">Needs attention</button>
        <button class="filter-btn" data-filter="A">Zone A</button>
        <button class="filter-btn" data-filter="B">Zone B</button>
        <button class="filter-btn" data-filter="C">Zone C</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Location</th>
            <th>Zone</th>
            <th>GM</th>
            <th>Health</th>
            <th class="num">Coverage</th>
            <th class="num">Shifts/wk to 120%</th>
            <th class="num">FT / PT</th>
            <th>Thin Shifts (Now)</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="8" class="status" id="status">Loading staffing data…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer-note">
      Source: Hiring Dashboard · Staffing Levels tab · Published CSV
    </div>
  </main>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlb5ubrEZwKLxIwVXZgeXNaRSOMJAGIYtYe4kYD5lC-HFDZQM0-UhWJVr70AmqwBYZ2qyBAqJZ5xYz/pub?gid=532056877&single=true&output=csv';

    // Minimal CSV parser that handles quoted fields and embedded commas/newlines
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
          else if (c === '"') { inQuotes = false; }
          else { field += c; }
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (c === '\r') { /* skip */ }
          else { field += c; }
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function classifyHealth(text) {
      const t = (text || '').toLowerCase();
      if (t.includes('critical')) return 'critical';
      if (t.includes('understaffed')) return 'understaffed';
      if (t.includes('sweet')) return 'sweet';
      if (t.includes('overstaffed')) return 'over';
      return '';
    }

    function cleanHealth(text) {
      return (text || '').replace(/[✗⚠✓↑]/g, '').trim();
    }

    function parsePercent(s) {
      const m = (s || '').match(/(\d+(?:\.\d+)?)/);
      return m ? parseFloat(m[1]) : null;
    }

    let allRows = [];
    let activeFilter = 'all';
    let searchTerm = '';

    function render() {
      const tbody = document.getElementById('rows');
      const term = searchTerm.toLowerCase();

      let filtered = allRows.filter(r => {
        if (activeFilter === 'thin') {
          return r.healthClass === 'critical' || r.healthClass === 'understaffed';
        }
        if (['A', 'B', 'C'].includes(activeFilter)) {
          return r.zone === activeFilter;
        }
        return true;
      });

      if (term) {
        filtered = filtered.filter(r =>
          r.location.toLowerCase().includes(term) ||
          r.gm.toLowerCase().includes(term)
        );
      }

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="status">No locations match.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(r => {
        const thinIsGood = r.thin.toLowerCase().includes('all good') || r.thin.trim() === '';
        const thinClass = thinIsGood ? 'thin good' : 'thin warn';
        const thinDisplay = thinIsGood ? '✓ All good' : r.thin;

        const shiftsCell = r.shiftsNeeded.trim()
          ? `<span class="shifts-need">${r.shiftsNeeded}</span>`
          : `<span class="shifts-need empty">—</span>`;

        const ft = parsePercent(r.ft) || 0;
        const pt = parsePercent(r.pt) || 0;
        const ratioBar = (ft + pt > 0) ? `
          <div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-muted);">${Math.round(ft)}/${Math.round(pt)}</span>
            <div class="ratio-bar" title="${Math.round(ft)}% FT, ${Math.round(pt)}% PT">
              <div class="ft" style="width:${ft}%"></div>
              <div class="pt" style="width:${pt}%"></div>
            </div>
          </div>
        ` : '—';

        return `
          <tr>
            <td class="location">${r.location}</td>
            <td><span class="zone">${r.zone}</span></td>
            <td class="gm">${r.gm || '—'}</td>
            <td><span class="health ${r.healthClass}">${cleanHealth(r.health)}</span></td>
            <td class="num coverage">${r.coverage}</td>
            <td class="num">${shiftsCell}</td>
            <td class="num">${ratioBar}</td>
            <td class="${thinClass}">${thinDisplay}</td>
          </tr>
        `;
      }).join('');
    }

    function renderSummary() {
      const counts = { critical: 0, understaffed: 0, sweet: 0, over: 0 };
      allRows.forEach(r => { if (counts[r.healthClass] !== undefined) counts[r.healthClass]++; });
      document.getElementById('summary').innerHTML = `
        <div class="pill critical"><span class="count">${counts.critical}</span> Critical</div>
        <div class="pill under"><span class="count">${counts.understaffed}</span> Understaffed</div>
        <div class="pill sweet"><span class="count">${counts.sweet}</span> Sweet Spot</div>
        <div class="pill over"><span class="count">${counts.over}</span> Overstaffed</div>
      `;
    }

    async function load() {
      try {
        const res = await fetch(CSV_URL + '&t=' + Date.now()); // cache-bust
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);

        // Find header row — looking for the row containing "Location"
        let headerIdx = -1;
        for (let i = 0; i < rows.length; i++) {
          if (rows[i].some(c => c.trim().toLowerCase() === 'location')) {
            headerIdx = i; break;
          }
        }
        if (headerIdx === -1) throw new Error('Could not find header row');

        const dataRows = rows.slice(headerIdx + 1).filter(r =>
          r.length > 1 && r[1] && r[1].trim() && !r[1].toLowerCase().includes('total')
        );

        allRows = dataRows.map(r => ({
          location: (r[1] || '').trim(),
          zone: (r[3] || '').trim(),
          gm: (r[4] || '').trim(),
          health: (r[5] || '').trim(),
          healthClass: classifyHealth(r[5]),
          coverage: (r[6] || '').trim(),
          shiftsNeeded: (r[7] || '').trim(),
          ft: (r[8] || '').trim(),
          pt: (r[9] || '').trim(),
          thin: (r[10] || '').trim(),
        })).filter(r => r.location);

        // Pull the timestamp from row 2 if present
        const stampRow = rows[2] || rows[1] || [];
        const stampText = stampRow.join(' ').match(/\d+\/\d+\/\d+,?\s*\d+:\d+:\d+\s*(?:AM|PM)?/i);
        document.getElementById('updated').textContent = stampText
          ? 'Sheet updated ' + stampText[0]
          : 'Loaded ' + new Date().toLocaleString();

        renderSummary();
        render();
      } catch (err) {
        document.getElementById('status').textContent = 'Failed to load: ' + err.message;
        document.getElementById('status').classList.add('error');
        console.error(err);
      }
    }

    // Event wiring
    document.getElementById('search').addEventListener('input', (e) => {
      searchTerm = e.target.value;
      render();
    });

    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.filter;
      render();
    });

    load();
    // Auto-refresh every 5 minutes
    setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
